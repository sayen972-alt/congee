<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier Congés DSI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f1ee;--surface:#fff;--ink:#1c1c1e;--muted:#8e8e93;--rule:#e5e5ea;
  --teal:#2d9da8;--teal-dk:#1a6b73;
  --ca-bg:#fef3c7;--ca-fg:#92400e;
  --can1-bg:#fefce8;--can1-fg:#713f12;
  --rtt-bg:#dcfce7;--rtt-fg:#14532d;
  --jf-bg:#dbeafe;--jf-fg:#1e3a8a;
  --wait-bg:#ffedd5;--wait-fg:#9a3412;
  --oth-bg:#f3e8ff;--oth-fg:#581c87;
  --we-bg:#f5f5f7;--ferie-bg:#d1d1d6;--ferie-fg:#636366;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:12px;min-height:100vh;}

.header{background:var(--teal-dk);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:12px;}
.header h1{font-family:'DM Mono',monospace;font-size:.85rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
.year-nav{display:flex;align-items:center;gap:8px;}
.year-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.year-nav button:hover{background:rgba(255,255,255,.28);}
.year-label{font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;min-width:50px;text-align:center;}
.status-pill{font-family:'DM Mono',monospace;font-size:.62rem;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);letter-spacing:.06em;white-space:nowrap;}
.status-pill.ok{background:rgba(34,197,94,.25);color:#86efac;}
.status-pill.demo{background:rgba(249,115,22,.25);color:#fdba74;}

.legend{padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--rule);display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted);}
.leg-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0;}

.filter-bar{display:flex;align-items:center;gap:8px;padding:6px 16px 8px;background:var(--bg);flex-wrap:wrap;}
.filter-label{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.agent-btn{font-family:'DM Sans',sans-serif;font-size:.72rem;padding:3px 10px;border:1px solid var(--rule);border-radius:20px;background:var(--surface);color:var(--ink);cursor:pointer;transition:all .15s;}
.agent-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);}

.content{padding:10px 16px 40px;}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;}
.spinner{width:28px;height:28px;border:2px solid var(--rule);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.month-block{margin-bottom:8px;background:var(--surface);border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.month-header{background:var(--teal);color:#fff;padding:5px 12px;font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;}

.cal-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal-table th,.cal-table td{border:1px solid var(--rule);text-align:center;vertical-align:middle;padding:0;overflow:hidden;}
.col-agent{width:110px;min-width:90px;}
.col-day{width:28px;min-width:20px;}

.th-hdr{height:18px;font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;color:#fff;background:#404040;}
.th-num{height:15px;font-family:'DM Mono',monospace;font-size:.58rem;color:#fff;background:#555;}
.th-agent-empty{background:#404040;}

.we{background:var(--we-bg)!important;color:#b0b0b8!important;}
.ferie-hdr{background:var(--ferie-bg)!important;color:var(--ferie-fg)!important;}

.td-agent{height:20px;text-align:left;padding:0 6px;font-size:.72rem;font-weight:600;background:#fafafa;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.td-day{height:20px;font-size:.56rem;font-weight:700;cursor:default;}
.td-day:hover{filter:brightness(.92);}

.t-CA    {background:var(--ca-bg);  color:var(--ca-fg);}
.t-CAN1  {background:var(--can1-bg);color:var(--can1-fg);}
.t-RTT   {background:var(--rtt-bg); color:var(--rtt-fg);}
.t-JF    {background:var(--jf-bg);  color:var(--jf-fg);}
.t-WAIT  {background:var(--wait-bg);color:var(--wait-fg);font-style:italic;}
.t-OTHER {background:var(--oth-bg); color:var(--oth-fg);}
.t-FERIE {background:var(--ferie-bg);color:var(--ferie-fg);}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Calendrier Congés DSI</h1>
    <div class="year-nav">
      <button onclick="changeYear(-1)">‹</button>
      <span class="year-label" id="year-label">2026</span>
      <button onclick="changeYear(1)">›</button>
    </div>
  </div>
  <span class="status-pill" id="status-pill">⬤ Connexion…</span>
</div>

<div class="legend">
  <span class="leg-item"><span class="leg-dot" style="background:#fef3c7;border:1px solid #f59e0b"></span>CA</span>
  <span class="leg-item"><span class="leg-dot" style="background:#fefce8;border:1px solid #eab308"></span>CA N-1</span>
  <span class="leg-item"><span class="leg-dot" style="background:#dcfce7;border:1px solid #22c55e"></span>RTT</span>
  <span class="leg-item"><span class="leg-dot" style="background:#dbeafe;border:1px solid #3b82f6"></span>JF / DEP PRO</span>
  <span class="leg-item"><span class="leg-dot" style="background:#ffedd5;border:1px solid #f97316"></span>En attente</span>
  <span class="leg-item"><span class="leg-dot" style="background:#d1d1d6"></span>Férié</span>
  <span class="leg-item"><span class="leg-dot" style="background:#f5f5f7;border:1px solid #e5e5ea"></span>Week-end</span>
</div>

<div class="filter-bar" id="filter-bar">
  <span class="filter-label">Agents :</span>
  <button class="agent-btn active" data-agent="ALL" onclick="filterAgent(this)">Tous</button>
</div>

<div class="content" id="content">
  <div class="loader"><div class="spinner"></div>Chargement…</div>
</div>

<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script>
let currentYear = new Date().getFullYear();
let allConges   = [];
let allAgents   = [];
let allFeries   = [];
let activeAgent = 'ALL';

const MOIS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin',
                 'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS_FR = ['D','L','M','M','J','V','S'];

// Jours fériés de secours
const FERIES_FALLBACK = [
  '2026-01-01','2026-04-06','2026-05-01','2026-05-08','2026-05-14',
  '2026-05-25','2026-07-14','2026-08-15','2026-11-01','2026-11-11','2026-12-25',
  '2025-01-01','2025-04-21','2025-05-01','2025-05-08','2025-05-29',
  '2025-06-09','2025-07-14','2025-08-15','2025-11-01','2025-11-11','2025-12-25',
];

// ── Grist ─────────────────────────────────────────────────────────────────
function initGrist() {
  const pill = document.getElementById('status-pill');
  if (typeof grist === 'undefined') {
    pill.textContent = '⬤ Hors Grist'; pill.classList.add('demo');
    showMessage('Widget non connecté à Grist.<br>Ajoutez ce widget dans une page Grist avec la table <strong>Demande_de_Conges</strong> comme source.');
    return;
  }
  grist.ready({ requiredAccess: 'full' });
  pill.textContent = '⬤ Connecté'; pill.classList.add('ok');
  // onRecords se déclenche à chaque modification de la table source
  grist.onRecords(async () => { await loadAll(); });
}

async function loadAll() {
  showLoader();
  try {
    const [c, a, f] = await Promise.all([
      grist.docApi.fetchTable('Demande_de_Conges'),
      grist.docApi.fetchTable('Le_Personnel'),
      grist.docApi.fetchTable('Jours_Feries'),
    ]);
    allConges = toRows(c);
    allAgents = toRows(a).filter(r => r.Statut === 'En poste');
    allFeries = toRows(f);
    buildFilters();
    render();
  } catch(e) {
    console.error('Erreur fetchTable:', e);
    showMessage('Erreur de chargement : ' + e.message);
  }
}

// Convertit format Grist {col:[val,val,...]} → [{col:val,...}]
function toRows(tbl) {
  const keys = Object.keys(tbl);
  if (!keys.length) return [];
  const len  = tbl[keys[0]].length;
  const rows = [];
  for (let i = 0; i < len; i++) {
    const r = {};
    keys.forEach(k => r[k] = tbl[k][i]);
    rows.push(r);
  }
  return rows;
}

function showLoader() {
  document.getElementById('content').innerHTML =
    '<div class="loader"><div class="spinner"></div>Chargement…</div>';
}

function showMessage(html) {
  document.getElementById('content').innerHTML =
    `<div class="loader" style="color:var(--muted);text-align:center;font-family:'DM Sans',sans-serif;font-size:.8rem;line-height:1.6">${html}</div>`;
}

// ── Filtres ────────────────────────────────────────────────────────────────
function buildFilters() {
  const bar = document.getElementById('filter-bar');
  bar.querySelectorAll('[data-agent]:not([data-agent="ALL"])').forEach(el=>el.remove());
  [...allAgents].sort((a,b)=>(a.Nom||'').localeCompare(b.Nom||'')).forEach(ag => {
    const btn = document.createElement('button');
    btn.className = 'agent-btn';
    btn.dataset.agent = ag.Nom_complet || ag.Nom;
    btn.textContent = ag.Nom;
    btn.onclick = function(){ filterAgent(this); };
    bar.appendChild(btn);
  });
}

function filterAgent(btn) {
  document.querySelectorAll('.agent-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeAgent = btn.dataset.agent;
  render();
}

function changeYear(d) {
  currentYear += d;
  document.getElementById('year-label').textContent = currentYear;
  render();
}

// ── Jours fériés ───────────────────────────────────────────────────────────
function getFeries() {
  const s = new Set();
  allFeries.forEach(f => {
    if (f.Date) {
      const d = new Date(f.Date * 1000);
      s.add(fmt(d));
    }
  });
  if (s.size < 5) FERIES_FALLBACK.forEach(d => s.add(d));
  return s;
}

function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Map congés ─────────────────────────────────────────────────────────────
function buildMap(feriesSet) {
  // map: "Nom_complet_YYYY-MM-DD" → {code, css, label}
  const map = {};

  // Construire lookup Nom_complet → Nom (court) pour les filtres
  // Dans Demande_de_Conges, la colonne "Nom" = Nom_complet de l'agent
  // Dans Le_Personnel, "Nom_complet" = "ABENON Teddy"

  allConges.forEach(row => {
    if (row.Type_de_Demande !== 'Congés') return;
    const statut = String(row.Statut || '');
    if (statut !== 'Validée' && statut !== 'En attente de validation') return;
    if (!row.Date_de_debut || !row.Date_de_fin) return;

    // Nom_complet de l'agent : colonne "Nom" dans Demande_de_Conges
    const nomComplet = String(row.Nom || '').trim();
    if (!nomComplet) return;

    const t = String(row.Type_de_Conges || '');
    let code, css;
    if (t.includes('CA N-1') || t.includes('N-1')) { code='CA N-1'; css='CAN1'; }
    else if (t.includes('CA'))                      { code='CA';     css='CA';   }
    else if (t.includes('RTT'))                     { code='RTT';    css='RTT';  }
    else if (t.includes('Formation')||t.includes('JF')||t.includes('DEP')||t.includes('PRO')) { code='JF'; css='JF'; }
    else if (t.includes('CMO'))  { code='CMO';  css='OTHER'; }
    else if (t.includes('ASA'))  { code='ASA';  css='OTHER'; }
    else if (t.includes('CET'))  { code='CET';  css='OTHER'; }
    else                         { code=t.slice(0,6); css='OTHER'; }

    const validated = statut === 'Validée';
    if (!validated) css = 'WAIT';

    const deb = new Date(row.Date_de_debut * 1000); deb.setHours(0,0,0,0);
    const fin = new Date(row.Date_de_fin   * 1000); fin.setHours(0,0,0,0);

    let d = new Date(deb);
    while (d <= fin) {
      if (d.getDay() !== 0 && d.getDay() !== 6) {
        const ds = fmt(d);
        if (!feriesSet.has(ds)) {
          map[`${nomComplet}_${ds}`] = { code, css, label:`${nomComplet} — ${t} (${statut})` };
        }
      }
      d.setDate(d.getDate()+1);
    }
  });
  return map;
}

// ── Rendu ─────────────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const feriesSet = getFeries();
  const congesMap = buildMap(feriesSet);

  // Agents à afficher — on utilise Nom_complet pour la correspondance
  let agents = allAgents.filter(a => a.Statut === 'En poste')
                        .sort((a,b) => (a.Nom||'').localeCompare(b.Nom||''));
  if (activeAgent !== 'ALL') {
    agents = agents.filter(a => (a.Nom_complet||a.Nom) === activeAgent);
  }

  for (let mois = 0; mois < 12; mois++) {
    const nbJ  = new Date(currentYear, mois+1, 0).getDate();
    const bloc = document.createElement('div');
    bloc.className = 'month-block';

    // En-tête
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.textContent = `${MOIS_FR[mois]} ${currentYear}`;
    bloc.appendChild(hdr);

    const tbl = document.createElement('table');
    tbl.className = 'cal-table';

    // ── Ligne noms de jours ──
    const trN = document.createElement('tr');
    const th0 = document.createElement('th');
    th0.className = 'col-agent th-agent-empty'; trN.appendChild(th0);
    for (let j = 1; j <= nbJ; j++) {
      const d   = new Date(currentYear, mois, j);
      const dow = d.getDay();
      const ds  = fmt(d);
      const th  = document.createElement('th');
      th.className = 'col-day th-hdr' + (dow===0||dow===6?' we':'') + (feriesSet.has(ds)?' ferie-hdr':'');
      th.textContent = JOURS_FR[dow];
      trN.appendChild(th);
    }
    tbl.appendChild(trN);

    // ── Ligne numéros ──
    const trD = document.createElement('tr');
    const th1 = document.createElement('th');
    th1.className = 'col-agent th-agent-empty'; trD.appendChild(th1);
    for (let j = 1; j <= nbJ; j++) {
      const d   = new Date(currentYear, mois, j);
      const dow = d.getDay();
      const ds  = fmt(d);
      const th  = document.createElement('th');
      th.className = 'col-day th-num' + (dow===0||dow===6?' we':'') + (feriesSet.has(ds)?' ferie-hdr':'');
      th.textContent = j;
      trD.appendChild(th);
    }
    tbl.appendChild(trD);

    // ── Lignes agents ──
    agents.forEach(ag => {
      const nomComplet = ag.Nom_complet || ag.Nom;
      const tr = document.createElement('tr');

      const tdNom = document.createElement('td');
      tdNom.className = 'col-agent td-agent';
      tdNom.textContent = ag.Nom;
      tdNom.title = nomComplet;
      tr.appendChild(tdNom);

      for (let j = 1; j <= nbJ; j++) {
        const d   = new Date(currentYear, mois, j);
        const dow = d.getDay();
        const ds  = fmt(d);
        const td  = document.createElement('td');
        td.className = 'col-day td-day';

        if (dow === 0 || dow === 6) {
          td.classList.add('we');
        } else if (feriesSet.has(ds)) {
          td.classList.add('t-FERIE');
          td.textContent = 'F';
          td.title = 'Jour férié';
        } else {
          const info = congesMap[`${nomComplet}_${ds}`];
          if (info) {
            td.classList.add(`t-${info.css}`);
            td.textContent = info.code;
            td.title = info.label;
          }
        }
        tr.appendChild(td);
      }
      tbl.appendChild(tr);
    });

    bloc.appendChild(tbl);
    content.appendChild(bloc);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('year-label').textContent = currentYear;
  initGrist();
});
</script>
</body>
</html>
